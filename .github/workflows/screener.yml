name: Weekly Early Momentum Screener

on:
  schedule:
    # 美股週五收盤後（美東 16:00 = UTC 21:00 = 台灣週六凌晨 05:00）
    - cron: '0 21 * * 5'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # Finviz pre-filter 大幅縮短執行時間

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "screener: $(date +'%Y-%m-%d') results"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 失敗告警：GitHub 預設會寄 email 給 repo owner（Actions 失敗通知），
      # 週六早上的敘事發酵 routine 也會偵測 CSV 過期並在報告中註明。
